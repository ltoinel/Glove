# Glove configuration

server:
  bind: "0.0.0.0"
  port: 8080
  workers: 1                    # 0 = auto (one per logical CPU)
  log_level: "info"             # trace, debug, info, warn, error
  shutdown_timeout: 30          # seconds — graceful shutdown for in-flight requests
  api_key: ""                   # Required for POST /api/reload. Empty = endpoint disabled
  cors_origins: []              # Allowed origins. ["*"] = permissive (not for production)
  rate_limit: 20                # Max requests/sec per IP. 0 = disabled

data:
  dir: "data"                   # sub-dirs gtfs/, osm/, raptor/, ban/ are implicit
  gtfs_url: "https://data.iledefrance-mobilites.fr/explore/dataset/offre-horaires-tc-gtfs-idfm/files/a925e164271e4bca93433756d6a340d1/download/"
  osm_url: "https://download.geofabrik.de/europe/france/ile-de-france-latest.osm.pbf"
  ban_url: "https://adresse.data.gouv.fr/data/ban/adresses/latest/csv"
  departments: [75, 77, 78, 91, 92, 93, 94, 95]

routing:
  max_journeys: 5
  max_transfers: 5
  default_transfer_time: 120    # seconds
  max_duration: 10800           # 3 hours in seconds

valhalla:
  host: "localhost"
  port: 8002

map:
  zoom: 11
  center_lat: 48.8566
  center_lon: 2.3522
  bounds_sw_lat: 48.1          # South-west corner (Île-de-France)
  bounds_sw_lon: 1.4
  bounds_ne_lat: 49.3          # North-east corner
  bounds_ne_lon: 3.6

bike:
  city:                         # City bike (Velib' mécanique)
    cycling_speed: 16.0         # km/h — realistic in dense urban areas
    use_roads: 0.2              # prefer bike lanes
    use_hills: 0.3              # avoid climbs
    bicycle_type: "City"

  ebike:                        # E-bike (VAE / Velib' électrique)
    cycling_speed: 21.0         # km/h — motor cuts at 25, avg ~21
    use_roads: 0.4              # accept sharing roads for speed
    use_hills: 0.8              # climbs are easy with motor assist
    bicycle_type: "Hybrid"

  road:                         # Road bike (fast commuter)
    cycling_speed: 25.0         # km/h — cruising speed on good roads
    use_roads: 0.6              # prefer smooth tarmac
    use_hills: 0.5              # effort accepted but not sought
    bicycle_type: "Road"
