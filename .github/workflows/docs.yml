name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - "book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: mdbook build book

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
