# nginx config for the Glove portal container.
# Serves the static SPA and forwards backend routes to the API container.
# `api` is the backend service name on the Docker Compose network.

upstream glove_api {
    server api:8080;
}

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # REST API and tile proxy.
    location /api/ {
        proxy_pass         http://glove_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Auto-generated OpenAPI specification.
    location /api-docs/ {
        proxy_pass       http://glove_api;
        proxy_set_header Host $host;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
